@if (isOpen) {
  <div class="fixed inset-0 z-50 flex items-center justify-center px-4">
    <div class="bg-white shadow-xl p-6 w-full max-w-xs sm:max-w-sm md:max-w-md">
      <!-- QR Code -->
      <div class="flex items-center justify-center mb-6">
        <qrcode
          [qrdata]="formattedCode"
          [width]="280"
          [errorCorrectionLevel]="'M'"
          cssClass="w-full h-auto"
        ></qrcode>
      </div>

      <!-- Footer -->
      <div class="flex justify-end">
        <button
          (click)="close.emit()"
          class="px-5 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700"
        >
          Close
        </button>
      </div>
    </div>
  </div>
}
