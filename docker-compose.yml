services:
  # ───────────────────────────────────────────────
  # PostgreSQL Database
  # ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: product_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d product_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ───────────────────────────────────────────────
  # Go Backend API
  # ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: product_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_PORT: "8080"
      GIN_MODE: ${GIN_MODE:-release}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: disable
      DB_TIMEZONE: Asia/Bangkok
    depends_on:
      postgres:
        condition: service_healthy

  # ───────────────────────────────────────────────
  # Angular Frontend (Nginx)
  # ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: product_web
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
